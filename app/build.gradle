plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.fallz.aikeyboard'
    compileSdk 34

    defaultConfig {
        applicationId "com.fallz.aikeyboard"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // Diisi lewat -PKIOSAPI_KEY=xxxx saat build, atau GitHub Secret
        buildConfigField "String", "KIOSAPI_KEY", "\"${project.findProperty('KIOSAPI_KEY') ?: ''}\""
    }

    buildFeatures {
        buildConfig true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
}
